<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Sila GUNGOR</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Print Specific CSS -->
    <style>
        .print-exact {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
        }

        @media print {
            @page {
                size: A4;
                margin: 0; 
            }
            html, body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                background-color: white !important;
                margin: 0 !important;
                padding: 0 !important;
                height: 100% !important;
                overflow: hidden !important;
            }
            
            .print-break-inside-avoid { 
                break-inside: avoid !important; 
                page-break-inside: avoid !important;
            }
            .print-hidden {
                display: none !important;
            }
            
            #controls-bar {
                display: none !important;
            }
            
            #root {
                overflow: hidden !important;
                height: 100% !important;
            }
            
            #cv-content {
                width: 210mm !important;
                height: 297mm !important; 
                max-height: 297mm !important;
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
                overflow: hidden !important;
                page-break-after: avoid;
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 transition-colors duration-300 flex flex-col items-center min-h-screen">
    <div id="root" class="w-full max-w-full overflow-x-auto pb-10 print:pb-0 print:overflow-hidden"></div>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const attrs = { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
            switch (name) {
                case 'User': return <svg {...attrs}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
                case 'BookOpen': return <svg {...attrs}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
                case 'Briefcase': return <svg {...attrs}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
                case 'Download': return <svg {...attrs}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
                case 'Upload': return <svg {...attrs}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
                case 'Edit2': return <svg {...attrs}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
                case 'Save': return <svg {...attrs}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
                case 'RotateCcw': return <svg {...attrs}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
                case 'Plus': return <svg {...attrs}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
                case 'Trash2': return <svg {...attrs}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
                case 'ImageIcon': return <svg {...attrs}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
                default: return null;
            }
        };

        // --- DATA ---
        const defaultData = {
          personal: {
            name: "Sila GUNGOR, PhD",
            photo: "https://media.licdn.com/dms/image/v2/D4D03AQHDr0_OlMpxCw/profile-displayphoto-shrink_800_800/B4DZacV6C0GsAc-/0/1746379711543?e=1776297600&v=beta&t=QW3IBhXVTn91On7hpcQdAdc-V8HBWaptObqyEb25XEQ",
            summary: "Results-driven Materials Scientist and Engineering Leader with over 15 years of experience in composite materials, nanotechnology, and manufacturing development. Proven track record of spearheading R&D projects, developing novel nanocomposites, and leading cross-functional teams in high-tech industries including wind energy and aerospace. Adept at bridging the gap between advanced material science research and scalable industrial manufacturing."
          },
          skills: [
            "Composite & Nanocomposite Materials", 
            "R&D Leadership & Project Mgmt", 
            "Additive Manufacturing", 
            "Structural Health Monitoring", 
            "Material Characterization", 
            "Design Thinking & Innovation",
            "Finite Element Analysis (FEA)", 
            "Budget & Resource Management"
          ],
          experience: [
            {
              company: "Siemens Gamesa",
              note: "Global leader in offshore wind power.",
              location: "Aalborg, Denmark",
              roles: [
                {
                  title: "Team Lead, Blade Manufacturing Development",
                  period: "Nov 2024 - Present",
                  description: [
                    "Leading engineering teams to optimize and innovate wind turbine blade manufacturing processes.",
                    "Developing strategic roadmaps for next-generation manufacturing technologies."
                  ]
                },
                {
                  title: "Senior Manufacturing Development Specialist",
                  period: "Feb 2022 - Nov 2024",
                  description: [
                    "Served as technology lead in complex preform development projects.",
                    "Spearheaded large-area additive manufacturing technology development initiatives.",
                    "Facilitated Innovation and Design Thinking sessions."
                  ]
                }
              ]
            },
            {
              company: "Roketsan Missiles Inc.",
              note: "",
              location: "Ankara / Bursa, Türkiye",
              roles: [
                {
                  title: "Multifunctional Material Tech. Unit Head",
                  period: "Sep 2017 - Nov 2021",
                  description: [
                    "Directed teams in the design, characterization, and prototype manufacturing of multi-functional materials for aerospace.",
                    "Managed university and research institution collaborations (e.g., Horizon 2020)."
                  ]
                },
                {
                  title: "Composite Materials Leader",
                  period: "Mar 2014 - Sep 2017",
                  description: [
                    "Led the design, characterization, and prototype manufacturing of advanced composite and nanocomposite materials."
                  ]
                }
              ]
            },
            {
              company: "The Pennsylvania State University",
              note: "",
              location: "State College, PA, USA",
              roles: [
                {
                  title: "Graduate Research Assistant",
                  period: "Sep 2011 - Dec 2013",
                  description: [
                    "Researched dispersion and alignment of nano-fillers in epoxy resins using electric fields."
                  ]
                }
              ]
            }
          ],
          education: [
            {
              degree: "Doctor of Philosophy (PhD), Engineering Science",
              school: "Penn State University",
              period: "2011 - 2013",
              details: ""
            },
            {
              degree: "Master of Science (MS), Materials Engineering",
              school: "METU",
              period: "2005 - 2008",
              details: ""
            },
            {
              degree: "Bachelor of Science (BS), Materials Engineering",
              school: "METU",
              period: "2001 - 2005",
              details: ""
            }
          ]
        };

        const getCompanyPeriod = (roles) => {
            if (!roles || roles.length === 0) return "";
            if (roles.length === 1) return roles[0].period || "";
            
            const firstRoleParts = (roles[0].period || "").split('-');
            const lastRoleParts = (roles[roles.length - 1].period || "").split('-');
            
            const latest = firstRoleParts.length > 1 ? firstRoleParts[1].trim() : "Present";
            const oldest = lastRoleParts[0].trim();
            
            return `${oldest} - ${latest}`;
        };

        // --- COMPONENTS ---
        const EditableField = ({ value, onChange, isEditing, multiline, className = "", placeholder }) => {
          if (!isEditing) {
            return <span className={`inline-block w-full ${className}`}>{value || placeholder}</span>;
          }

          const baseClasses = `w-full bg-white/90 border border-blue-400 rounded px-1.5 py-0.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 transition-colors print-hidden block ${className}`;

          return multiline ? (
            <textarea 
              className={`${baseClasses} resize-y min-h-[50px] leading-snug`}
              value={value} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
            />
          ) : (
            <input 
              type="text" 
              className={baseClasses}
              value={value} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
            />
          );
        };

        const App = () => {
          const [isEditing, setIsEditing] = useState(false);
          const [data, setData] = useState(defaultData);
          const [isPrintPending, setIsPrintPending] = useState(false);
          const [printScale, setPrintScale] = useState(1);
          
          const fileInputRef = useRef(null);

          useEffect(() => {
            try {
              const savedData = localStorage.getItem('cvDataV5');
              if (savedData) {
                setData(JSON.parse(savedData));
              }
            } catch (e) {
              console.error("Local storage error:", e);
            }
          }, []);

          useEffect(() => {
            try {
              localStorage.setItem('cvDataV5', JSON.stringify(data));
            } catch (e) {
              console.error("Local storage write error:", e);
            }
          }, [data]);

          const handlePrint = () => {
            // Düzenleme modundan çık ki gerçek boyutları (span) ölçebilelim
            if (isEditing) setIsEditing(false);
            setIsPrintPending(true); // Gösterge başlasın

            // DOM'un güncellenmesi için (düzenleme modundan okuma moduna) bekle
            setTimeout(() => {
              const wrapper = document.getElementById('print-wrapper');
              let scaleToSet = 1;
              if (wrapper) {
                const targetHeight = 1115; // A4'ün px cinsinden yaklaşık yüksekliği (güvenlik payı ile)
                const currentHeight = wrapper.scrollHeight;
                
                // Eğer içerik sayfa boyutunu aşıyorsa otomatik scale et
                if (currentHeight > targetHeight) {
                  scaleToSet = targetHeight / (currentHeight + 20); // Biraz daha güvenlik payı ekle
                }
              }
              setPrintScale(scaleToSet);

              // Scale uygulandıktan sonra layout'un tam oturması için az daha bekle ve yazdır
              setTimeout(() => {
                window.print();
                setIsPrintPending(false);
                setPrintScale(1); // Yazdırdıktan sonra normale dön
              }, 300);
            }, 300);
          };

          const resetData = () => {
            if(window.confirm("Tüm değişiklikler silinip orijinal CV verisine dönülecek. Emin misin?")) {
              setData(defaultData);
              localStorage.removeItem('cvDataV5');
            }
          };

          const handleExport = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "cv-data-yedek.json");
            document.body.appendChild(downloadAnchorNode); // Firefox requires the link to be in the body
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
          };

          const handleImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const importedData = JSON.parse(e.target.result);
                setData(importedData);
                alert("CV verileri başarıyla yüklendi!");
              } catch (err) {
                alert("Geçersiz veya bozuk JSON dosyası!");
              }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input to allow uploading the same file again if needed
          };
          
          const updatePersonal = (field, value) => {
            setData(prev => ({ ...prev, personal: { ...prev.personal, [field]: value } }));
          };

          const updateSkill = (index, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills[index] = value;
              return newData;
            });
          };

          const addSkill = () => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills.push("Yeni Yetenek");
              return newData;
            });
          };

          const removeSkill = (index) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills.splice(index, 1);
              return newData;
            });
          };

          const updateEdu = (index, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.education[index][field] = value;
              return newData;
            });
          };

          const updateExp = (index, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[index][field] = value;
              return newData;
            });
          };

          const updateRole = (expIndex, roleIndex, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex][field] = value;
              return newData;
            });
          };

          const updateRoleDesc = (expIndex, roleIndex, descIndex, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description[descIndex] = value;
              return newData;
            });
          };

          const addRoleDesc = (expIndex, roleIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description.push("Sorumluluk eklendi. Düzenleyin.");
              return newData;
            });
          };

          const removeRoleDesc = (expIndex, roleIndex, descIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description.splice(descIndex, 1);
              return newData;
            });
          };

          const addExperience = () => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience.push({
                company: "Yeni Şirket",
                note: "",
                location: "Şehir, Ülke",
                roles: [{
                  title: "Yeni Pozisyon",
                  period: "Ay Yıl - Ay Yıl",
                  description: ["Sorumluluk ekleyin."]
                }]
              });
              return newData;
            });
          };

          const removeExperience = (expIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience.splice(expIndex, 1);
              return newData;
            });
          };

          const addRole = (expIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles.push({
                title: "Yeni Pozisyon",
                period: "Ay Yıl - Ay Yıl",
                description: ["Sorumluluk ekleyin."]
              });
              return newData;
            });
          };

          const removeRole = (expIndex, roleIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles.splice(roleIndex, 1);
              return newData;
            });
          };
          
          const addEducation = () => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.education.push({
                degree: "Yeni Derece",
                school: "Yeni Okul",
                period: "Yıl - Yıl",
                details: ""
              });
              return newData;
            });
          };

          const removeEducation = (index) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.education.splice(index, 1);
              return newData;
            });
          };

          return (
            <div className="w-full flex flex-col items-center">
              {/* Controls Header */}
              <div id="controls-bar" className="sticky top-0 z-50 w-full flex flex-wrap justify-center items-center p-3 gap-3 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm transition-colors print:hidden">
                <button 
                  onClick={() => setIsEditing(!isEditing)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full font-semibold transition-colors shadow-sm text-sm ${
                    isEditing 
                      ? 'bg-emerald-500 hover:bg-emerald-600 text-white' 
                      : 'bg-slate-800 hover:bg-slate-900 text-white'
                  }`}
                >
                  {isEditing ? <><Icon name="Save" size={16} /> Düzenlemeyi Bitir & Kaydet</> : <><Icon name="Edit2" size={16} /> Özgeçmişi Düzenle</>}
                </button>

                {isEditing && (
                  <>
                    <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>
                    
                    {/* JSON Import/Export */}
                    <button 
                      onClick={handleExport}
                      className="flex items-center gap-2 px-3 py-2 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium transition-colors border border-blue-200 text-sm"
                      title="Verileri Yedekle (JSON)"
                    >
                      <Icon name="Download" size={16} /> <span className="hidden sm:inline">Dışa Aktar</span>
                    </button>
                    
                    <button 
                      onClick={() => fileInputRef.current.click()}
                      className="flex items-center gap-2 px-3 py-2 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-medium transition-colors border border-blue-200 text-sm"
                      title="Yedekten Veri Yükle (JSON)"
                    >
                      <Icon name="Upload" size={16} /> <span className="hidden sm:inline">İçe Aktar</span>
                    </button>
                    <input type="file" accept=".json" ref={fileInputRef} onChange={handleImport} className="hidden" />

                    <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>

                    <button 
                      onClick={resetData}
                      className="flex items-center gap-2 px-3 py-2 rounded-full bg-red-50 hover:bg-red-100 text-red-600 font-medium transition-colors border border-red-200 text-sm"
                      title="Orijinal Verilere Dön"
                    >
                      <Icon name="RotateCcw" size={16} /> <span className="hidden sm:inline">Sıfırla</span>
                    </button>
                  </>
                )}

                <div className="w-px h-5 bg-slate-300 mx-1 hidden sm:block"></div>

                <button 
                  onClick={handlePrint}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full transition-colors font-semibold shadow-sm text-sm ${
                    isPrintPending ? 'bg-indigo-300 text-indigo-800 cursor-wait' : 'bg-indigo-600 hover:bg-indigo-700 text-white'
                  }`}
                  disabled={isPrintPending}
                >
                  <Icon name="Download" size={16} />
                  <span>{isPrintPending ? 'Hazırlanıyor...' : 'PDF İndir'}</span>
                </button>
              </div>

              {/* Main CV Container */}
              <div id="cv-content" className={`w-[210mm] bg-white print:m-0 print:shadow-none shadow-2xl relative flex flex-row mt-6 text-slate-800 ${isEditing ? 'min-h-[297mm] h-auto overflow-visible pb-12' : 'h-[297mm] overflow-hidden'}`}>
                
                {/* Print Wrapper - Used for scaling down if content overflows */}
                <div 
                    id="print-wrapper" 
                    className="w-full h-full flex flex-row origin-top-left"
                    style={printScale !== 1 ? { transform: `scale(${printScale})`, width: `${100 / printScale}%`, height: `${100 / printScale}%` } : {}}
                >
                  {/* --- LEFT COLUMN --- */}
                  <div className="w-[30%] flex flex-col z-20 relative bg-[#e6e8eb] print-exact min-h-full">
                    
                    {/* Top Dark Area for Photo Alignment */}
                    <div className="h-[65px] w-full bg-[#3b4256] print-exact relative flex justify-center items-end shrink-0">
                      {/* Photo */}
                      <div className="absolute bottom-[-40px] w-[84px] h-[84px] rounded-full border-[4px] border-[#e6e8eb] print-exact overflow-hidden group bg-white shadow-sm z-30">
                          <img 
                            src={data.personal.photo} 
                            alt={data.personal.name} 
                            className="w-full h-full object-cover"
                          />
                          {isEditing && (
                            <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity p-2 text-center">
                              <Icon name="ImageIcon" className="text-white mb-1" size={12} />
                              <input 
                                type="text" 
                                className="w-full text-[8px] p-1 rounded text-black border-none focus:ring-2 focus:ring-blue-500" 
                                value={data.personal.photo} 
                                onChange={e => updatePersonal('photo', e.target.value)} 
                              />
                            </div>
                          )}
                      </div>
                    </div>

                    {/* Left Column Content */}
                    <div className="flex-1 px-5 pt-[45px] pb-4 flex flex-col gap-5">
                      
                      {/* SKILLS */}
                      <div className="print-break-inside-avoid">
                          <h3 className="text-[12px] font-bold uppercase tracking-[0.2em] text-[#3b4256] border-b-[2px] border-slate-300 pb-1.5 mb-3">
                            Competencies
                          </h3>
                          <ul className="space-y-1.5">
                            {data.skills.map((skill, index) => (
                              <li key={index} className="flex items-start group">
                                <span className="w-1.5 h-1.5 rounded-full bg-[#3b4256] print-exact mr-2 mt-1.5 flex-shrink-0"></span>
                                <div className="text-[11px] font-semibold text-slate-700 leading-tight">
                                  <EditableField value={skill} onChange={(v) => updateSkill(index, v)} isEditing={isEditing} />
                                </div>
                                {isEditing && (
                                  <button onClick={() => removeSkill(index)} className="ml-auto text-red-500 hover:text-red-700 opacity-50 hover:opacity-100 print:hidden pl-2">
                                    <Icon name="Trash2" size={10} />
                                  </button>
                                )}
                              </li>
                            ))}
                          </ul>
                          {isEditing && (
                            <button onClick={addSkill} className="mt-2 px-2 py-1 border border-dashed border-slate-400 text-slate-600 rounded flex items-center gap-1 hover:bg-slate-200 text-[9px] w-full justify-center transition-colors print:hidden">
                              <Icon name="Plus" size={10} /> Yetenek Ekle
                            </button>
                          )}
                      </div>

                      {/* EDUCATION */}
                      <div className="print-break-inside-avoid">
                          <h3 className="text-[12px] font-bold uppercase tracking-[0.2em] text-[#3b4256] border-b-[2px] border-slate-300 pb-1.5 mb-3">
                            Education
                          </h3>
                          <div className="space-y-3">
                            {data.education.map((edu, index) => (
                              <div key={index} className="group relative">
                                {isEditing && (
                                  <button onClick={() => removeEducation(index)} className="absolute -left-5 top-0 text-red-400 hover:text-red-600 print-hidden" title="Eğitimi Sil">
                                    <Icon name="Trash2" size={10} />
                                  </button>
                                )}
                                <div className="text-[9px] font-bold text-slate-500 mb-0.5">
                                  <EditableField value={edu.period} onChange={(v) => updateEdu(index, 'period', v)} isEditing={isEditing} />
                                </div>
                                <div className="text-[11px] font-bold text-slate-800 leading-tight mb-0.5">
                                  <EditableField value={edu.degree} onChange={(v) => updateEdu(index, 'degree', v)} isEditing={isEditing} multiline={isEditing} />
                                </div>
                                <div className="text-[10px] text-slate-600 leading-snug">
                                  <EditableField value={edu.school} onChange={(v) => updateEdu(index, 'school', v)} isEditing={isEditing} />
                                </div>
                              </div>
                            ))}
                          </div>
                          {isEditing && (
                            <button onClick={addEducation} className="mt-3 px-2 py-1 border border-dashed border-slate-400 text-slate-600 rounded flex items-center gap-1 hover:bg-slate-200 text-[9px] w-full justify-center transition-colors print:hidden">
                              <Icon name="Plus" size={10} /> Eğitim Ekle
                            </button>
                          )}
                      </div>

                    </div>
                  </div>

                  {/* --- RIGHT COLUMN --- */}
                  <div className="w-[70%] flex flex-col z-10 bg-white">
                    
                    {/* Top Header */}
                    <div className="h-[65px] w-full bg-[#3b4256] print-exact flex flex-col justify-center pl-[35px] pr-6 shrink-0">
                      <h1 className="text-[26px] font-black text-white uppercase tracking-widest leading-none m-0">
                        <EditableField value={data.personal.name} onChange={(v) => updatePersonal('name', v)} isEditing={isEditing} className={isEditing ? "!text-black !font-bold" : ""} />
                      </h1>
                    </div>

                    {/* Main Content Area */}
                    <div className={`flex-1 relative pl-[70px] pr-8 py-6 ${isEditing ? 'overflow-visible' : 'overflow-hidden'}`}>
                      
                      {/* Central Timeline Continuous Line */}
                      <div className="absolute left-[35px] top-[38px] bottom-[30px] w-[2px] bg-[#a0aabf] print-exact"></div>

                      {/* PROFILE */}
                      <div className="relative pb-5 print-break-inside-avoid">
                          <div className="absolute w-8 h-8 rounded-full bg-[#3b4256] print-exact flex items-center justify-center text-white z-10 border-[3px] border-white shadow-sm" style={{ left: '-51px', top: '-2px' }}>
                              <Icon name="User" size={14} />
                          </div>
                          <h3 className="text-[16px] font-bold uppercase tracking-[0.2em] text-[#3b4256] mb-2 mt-0">
                              Profile
                          </h3>
                          <div className="text-[11px] text-slate-600 leading-snug text-justify">
                              <EditableField value={data.personal.summary} onChange={(v) => updatePersonal('summary', v)} isEditing={isEditing} multiline />
                          </div>
                        </div>

                      {/* WORK EXPERIENCE */}
                      <div className="relative pb-3">
                          <div className="absolute w-8 h-8 rounded-full bg-[#3b4256] print-exact flex items-center justify-center text-white z-10 border-[3px] border-white shadow-sm" style={{ left: '-51px', top: '-2px' }}>
                              <Icon name="Briefcase" size={14} />
                          </div>
                          <h3 className="text-[16px] font-bold uppercase tracking-[0.2em] text-[#3b4256] mb-4 mt-0">
                              Work Experience
                          </h3>

                          <div className="space-y-4">
                              {data.experience.map((exp, expIndex) => (
                                <div key={expIndex} className="relative print-break-inside-avoid">
                                  {/* Timeline dot */}
                                  <div className="absolute w-[8px] h-[8px] rounded-full bg-white print-exact border-[2px] border-[#a0aabf] z-10" style={{ left: '-39px', top: '6px' }}></div>
                                  
                                  <div className="flex flex-col mb-2">
                                      <div className="flex justify-between items-baseline">
                                          <h4 className="text-[13px] font-extrabold text-[#3b4256] flex items-center gap-2">
                                            <EditableField value={exp.company} onChange={(v) => updateExp(expIndex, 'company', v)} isEditing={isEditing} />
                                            {isEditing && (
                                                <button onClick={() => removeExperience(expIndex)} className="text-red-400 hover:text-red-600 print-hidden shrink-0" title="Şirketi Sil">
                                                    <Icon name="Trash2" size={12} />
                                                </button>
                                            )}
                                          </h4>
                                          <span className="text-[9.5px] font-bold text-slate-500 whitespace-nowrap ml-2">
                                            {!isEditing ? (
                                                <span>{getCompanyPeriod(exp.roles)}</span>
                                            ) : (
                                                <span className="italic opacity-50 text-[8.5px]">(Tarihlerden hesaplanır)</span>
                                            )}
                                          </span>
                                      </div>
                                      
                                      {/* TAM GENİŞLİK ALAN ŞİRKET NOTU */}
                                      {(isEditing || exp.note) && (
                                          <div className="text-[10px] font-medium text-slate-500 italic mt-0.5 w-full">
                                              <EditableField 
                                                  value={exp.note || ""} 
                                                  placeholder="Şirket hakkında kısa not (opsiyonel, tam satır)" 
                                                  onChange={(v) => updateExp(expIndex, 'note', v)} 
                                                  isEditing={isEditing} 
                                              />
                                          </div>
                                      )}
                                  </div>

                                  {exp.roles.map((role, roleIndex) => (
                                      <div key={roleIndex} className="mb-2 last:mb-0">
                                        <div className="flex justify-between items-baseline mb-1">
                                            <div className="text-[11.5px] font-semibold text-slate-700 flex items-center gap-2">
                                                <EditableField value={role.title} onChange={(v) => updateRole(expIndex, roleIndex, 'title', v)} isEditing={isEditing} />
                                                {isEditing && (
                                                    <button onClick={() => removeRole(expIndex, roleIndex)} className="text-red-400 hover:text-red-600 print-hidden shrink-0" title="Pozisyonu Sil">
                                                      <Icon name="Trash2" size={10} />
                                                    </button>
                                                )}
                                            </div>
                                            <div className="text-[9.5px] font-medium text-slate-500 whitespace-nowrap ml-2">
                                                <EditableField value={role.period} onChange={(v) => updateRole(expIndex, roleIndex, 'period', v)} isEditing={isEditing} />
                                            </div>
                                        </div>
                                        <ul className="space-y-1">
                                            {role.description.map((item, descIndex) => (
                                              <li key={descIndex} className="flex items-start text-[11px] text-slate-600 leading-snug group">
                                                  <span className="mr-2 mt-1.5 w-1 h-1 rounded-full bg-slate-400 print-exact flex-shrink-0"></span>
                                                  <div className="flex-1 text-justify">
                                                    <EditableField value={item} onChange={(v) => updateRoleDesc(expIndex, roleIndex, descIndex, v)} isEditing={isEditing} multiline={isEditing} />
                                                  </div>
                                                  {isEditing && (
                                                    <button onClick={() => removeRoleDesc(expIndex, roleIndex, descIndex)} className="ml-2 text-red-400 hover:text-red-600 opacity-50 hover:opacity-100 flex-shrink-0 print:hidden mt-0.5">
                                                        <Icon name="Trash2" size={10} />
                                                    </button>
                                                  )}
                                              </li>
                                            ))}
                                        </ul>
                                        {isEditing && (
                                            <button onClick={() => addRoleDesc(expIndex, roleIndex)} className="mt-1 px-2 py-1 border border-dashed border-slate-300 text-slate-400 rounded flex items-center gap-1 hover:bg-slate-50 text-[9px] transition-colors print:hidden">
                                              <Icon name="Plus" size={8} /> Sorumluluk Ekle
                                            </button>
                                        )}
                                      </div>
                                  ))}
                                  {isEditing && (
                                      <button onClick={() => addRole(expIndex)} className="mt-2 mb-2 px-2 py-1.5 border border-dashed border-blue-300 text-blue-500 rounded flex items-center gap-1 hover:bg-blue-50 text-[9.5px] font-semibold transition-colors print:hidden w-max">
                                        <Icon name="Plus" size={10} /> Yeni Pozisyon Ekle
                                      </button>
                                  )}
                                </div>
                              ))}
                          </div>
                          {isEditing && (
                              <button onClick={addExperience} className="mt-6 px-3 py-2 border-2 border-dashed border-[#3b4256] text-[#3b4256] rounded-lg flex items-center justify-center gap-2 hover:bg-slate-100 text-[11px] font-bold uppercase tracking-wider transition-colors print:hidden w-full">
                                <Icon name="Plus" size={14} /> Yeni Şirket (İş Deneyimi) Ekle
                              </button>
                          )}
                        </div>

                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
