<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Sila GUNGOR</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Print Specific CSS -->
    <style>
        @media print {
            @page {
                size: A4;
                margin: 12mm 10mm;
            }
            body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                background-color: white !important;
            }
            .dark {
                background-color: white !important;
                color: #0f172a !important; 
            }
            .dark h1, .dark h2, .dark h3, .dark h4, .dark h5 {
                color: #0f172a !important;
            }
            .dark .text-slate-200, .dark .text-slate-300, .dark .text-slate-400 {
                color: #334155 !important; 
            }
            .dark .bg-slate-800, .dark .bg-slate-800\/50 {
                background-color: #f1f5f9 !important; 
                border-color: #cbd5e1 !important; 
            }
            .dark .bg-slate-900 {
                background-color: white !important;
            }
            
            .print-break-inside-avoid { 
                break-inside: avoid !important; 
                page-break-inside: avoid !important;
            }
            .print-hidden {
                display: none !important;
            }
            
            /* Hide print button area on actual print */
            #controls-bar {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300">
    <div id="root"></div>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (SVG Replacements for Lucide-React) ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const attrs = { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
            switch (name) {
                case 'Sun': return <svg {...attrs}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
                case 'Moon': return <svg {...attrs}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
                case 'MapPin': return <svg {...attrs}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
                case 'Mail': return <svg {...attrs}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
                case 'BookOpen': return <svg {...attrs}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
                case 'Briefcase': return <svg {...attrs}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
                case 'GraduationCap': return <svg {...attrs}><path d="M21.42 10.922a2 2 0 0 0-.019-3.838L12.83 4.34a2 2 0 0 0-1.66 0L2.6 7.08a2 2 0 0 0 0 3.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>;
                case 'ChevronRight': return <svg {...attrs}><path d="m9 18 6-6-6-6"/></svg>;
                case 'Download': return <svg {...attrs}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
                case 'Edit2': return <svg {...attrs}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
                case 'Save': return <svg {...attrs}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
                case 'RotateCcw': return <svg {...attrs}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
                case 'Plus': return <svg {...attrs}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
                case 'Trash2': return <svg {...attrs}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
                case 'ImageIcon': return <svg {...attrs}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
                default: return null;
            }
        };

        // --- DATA ---
        const defaultData = {
          personal: {
            name: "Sila GUNGOR, PhD",
            title: "Team Lead, Blade Manufacturing Development",
            location: "Aalborg, Denmark",
            email: "contact@example.com",
            photo: "https://media.licdn.com/dms/image/v2/D4D03AQHDr0_OlMpxCw/profile-displayphoto-shrink_800_800/B4DZacV6C0GsAc-/0/1746379711543?e=1776297600&v=beta&t=QW3IBhXVTn91On7hpcQdAdc-V8HBWaptObqyEb25XEQ",
            summary: "Results-driven Materials Scientist and Engineering Leader with over 15 years of experience in composite materials, nanotechnology, and manufacturing development. Proven track record of spearheading R&D projects, developing novel nanocomposites, and leading cross-functional teams in high-tech industries including wind energy and aerospace. Adept at bridging the gap between advanced material science research and scalable industrial manufacturing."
          },
          skills: [
            "Composite & Nanocomposite Materials", "R&D Leadership & Project Management", "Additive Manufacturing", 
            "Structural Health Monitoring", "Material Characterization", "Design Thinking & Innovation",
            "Finite Element Analysis (FEA)", "Budget & Resource Management"
          ],
          experience: [
            {
              company: "Siemens Gamesa",
              location: "Aalborg, Denmark",
              roles: [
                {
                  title: "Team Lead, Blade Manufacturing Development",
                  period: "Nov 2024 - Present",
                  description: [
                    "Leading engineering teams to optimize and innovate wind turbine blade manufacturing processes.",
                    "Developing strategic roadmaps for next-generation manufacturing technologies."
                  ]
                },
                {
                  title: "Senior Manufacturing Development Specialist",
                  period: "Feb 2022 - Nov 2024",
                  description: [
                    "Served as technology lead in complex preform development projects.",
                    "Spearheaded large-area additive manufacturing technology development initiatives.",
                    "Facilitated Innovation and Design Thinking sessions to accelerate new product implementations.",
                    "Generated comprehensive roadmaps for wind turbine blade manufacturing processes."
                  ]
                },
                {
                  title: "Manufacturing Development Specialist",
                  period: "Dec 2021 - Feb 2022",
                  description: [
                    "Contributed to preform development processes for advanced wind turbine blades."
                  ]
                }
              ]
            },
            {
              company: "Roketsan Missiles Inc.",
              location: "Ankara / Bursa, Türkiye",
              roles: [
                {
                  title: "Multifunctional Material Tech. Unit Head",
                  period: "Sep 2017 - Nov 2021",
                  description: [
                    "Directed teams in the design, characterization, and prototype manufacturing of multi-functional materials for rockets, missiles, space launch vehicles.",
                    "Led joint R&D projects with universities focusing on novel composites.",
                    "Managed university and research institution collaborations (e.g., Horizon 2020, Project EIROS).",
                    "Oversaw the material characterization laboratory.",
                    "Administered annual budgets and managed engineering and technician resources efficiently."
                  ]
                },
                {
                  title: "Composite Materials Leader",
                  period: "Mar 2014 - Sep 2017",
                  description: [
                    "Led the design, characterization, and prototype manufacturing of advanced composite and nanocomposite materials used in defense and space applications."
                  ]
                },
                {
                  title: "Composite Materials Engineer",
                  period: "Jun 2008 - Sep 2011",
                  description: [
                    "Executed structural design of composite materials (carbon, aramid, glass reinforced epoxy).",
                    "Performed filament winding, resin infusion, and resin transfer molding for complex parts.",
                    "Conducted quasistatic, dynamic, and environmental testing of composite materials."
                  ]
                }
              ]
            },
            {
              company: "The Pennsylvania State University",
              location: "State College, PA, USA",
              roles: [
                {
                  title: "Graduate Research Assistant",
                  period: "Sep 2011 - Dec 2013",
                  description: [
                    "Researched dispersion and alignment of nano-fillers (carbon black, CNTs, CNFs) in epoxy resins using electric fields.",
                    "Pioneered methods for damage detection in GFRPs using electrical resistance measurements for structural health monitoring."
                  ]
                }
              ]
            },
            {
              company: "Middle East Technical University (METU)",
              location: "Ankara, Türkiye",
              roles: [
                {
                  title: "Research Assistant",
                  period: "Sep 2005 - Jun 2008",
                  description: [
                    "Managed Metallography and X-Ray Diffraction Laboratories.",
                    "Served as Teaching Assistant for Materials Science, Advanced Crystallography, and Diffraction courses."
                  ]
                }
              ]
            }
          ],
          education: [
            {
              degree: "Doctor of Philosophy (PhD), Engineering Science and Mechanics",
              school: "Penn State University",
              period: "2011 - 2013",
              grade: "GPA: 3.93/4.00",
              details: "Dissertation: Electric-Field-Induced Alignment of Carbon Nanofillers in Multifunctional Glass-Epoxy Composites."
            },
            {
              degree: "Master of Science (MS), Materials and Metallurgical Engineering",
              school: "Middle East Technical University (METU)",
              period: "2005 - 2008",
              grade: "GPA: 3.86/4.00",
              details: "Thesis: Investigations on Bulk Glass Forming Ability of Titanium Based Multicomponent Alloys."
            },
            {
              degree: "Bachelor of Science (BS), Materials and Metallurgical Engineering",
              school: "Middle East Technical University (METU)",
              period: "2001 - 2005",
              grade: "GPA: 3.27/4.00",
              details: ""
            }
          ],
          publications: [
            {
              title: "The effect of CNT-reinforced polyurethane foam cores to flexural properties of sandwich composites",
              journal: "Composites Part A: Applied Science and Manufacturing",
              date: "2018"
            },
            {
              title: "Damage detection via electrical impedance tomography in glass fiber/epoxy laminates with carbon black filler",
              journal: "Structural Health Monitoring",
              date: "2015"
            },
            {
              title: "Indentation damage detection in glass/epoxy composite laminates with electrically tailored conductive nanofiller",
              journal: "Journal of Intelligent Material Systems and Structures",
              date: "2016"
            },
            {
              title: "In-plane shear of nanoprepreg/nanostitched three-dimensional carbon/epoxy multiwalled carbon nanotubes composites",
              journal: "Journal of Composite Materials",
              date: "2019"
            },
            {
              title: "Mode-II toughness of nanostitched carbon/epoxy multiwall carbon nanotubes prepreg composites",
              journal: "Journal of Composite Materials",
              date: "2019"
            }
          ]
        };

        // --- COMPONENTS ---
        const EditableField = ({ value, onChange, isEditing, multiline, className = "", placeholder }) => {
          if (!isEditing) {
            return <span className={className}>{value || placeholder}</span>;
          }

          const baseClasses = `w-full bg-white dark:bg-slate-800 border border-blue-400 dark:border-blue-500 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white transition-colors print-hidden ${className}`;

          return multiline ? (
            <textarea 
              className={`${baseClasses} resize-y min-h-[80px] leading-relaxed`}
              value={value} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
            />
          ) : (
            <input 
              type="text" 
              className={baseClasses}
              value={value} 
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
            />
          );
        };

        const App = () => {
          const [darkMode, setDarkMode] = useState(false);
          const [isEditing, setIsEditing] = useState(false);
          const [data, setData] = useState(defaultData);
          const [isPrintPending, setIsPrintPending] = useState(false);

          useEffect(() => {
            const savedData = localStorage.getItem('cvData');
            if (savedData) {
              try {
                setData(JSON.parse(savedData));
              } catch (e) {
                console.error("Local storage error:", e);
              }
            }
          }, []);

          useEffect(() => {
            localStorage.setItem('cvData', JSON.stringify(data));
          }, [data]);

          useEffect(() => {
            if (darkMode) {
              document.body.classList.add('dark');
            } else {
              document.body.classList.remove('dark');
            }
          }, [darkMode]);

          const toggleTheme = () => setDarkMode(!darkMode);

          // The updated robust print function
          const handlePrint = () => {
            if (isEditing) {
              setIsEditing(false); // First exit edit mode
              setIsPrintPending(true); // Show preparing text
              
              // Give React enough time to render text from inputs to spans
              setTimeout(() => {
                window.print();
                setIsPrintPending(false);
              }, 600); 
            } else {
              window.print();
            }
          };

          const resetData = () => {
            if(window.confirm("Tüm değişiklikler silinip orijinal CV verisine dönülecek. Emin misin?")) {
              setData(defaultData);
              localStorage.removeItem('cvData');
            }
          };
          
          const updatePersonal = (field, value) => {
            setData(prev => ({ ...prev, personal: { ...prev.personal, [field]: value } }));
          };

          const updateSkill = (index, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills[index] = value;
              return newData;
            });
          };

          const addSkill = () => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills.push("Yeni Yetenek");
              return newData;
            });
          };

          const removeSkill = (index) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.skills.splice(index, 1);
              return newData;
            });
          };

          const updateEdu = (index, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.education[index][field] = value;
              return newData;
            });
          };

          const updatePub = (index, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.publications[index][field] = value;
              return newData;
            });
          };

          const updateExp = (index, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[index][field] = value;
              return newData;
            });
          };

          const updateRole = (expIndex, roleIndex, field, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex][field] = value;
              return newData;
            });
          };

          const updateRoleDesc = (expIndex, roleIndex, descIndex, value) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description[descIndex] = value;
              return newData;
            });
          };

          const addRoleDesc = (expIndex, roleIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description.push("Yeni sorumluluk eklendi. Burayı düzenleyin.");
              return newData;
            });
          };

          const removeRoleDesc = (expIndex, roleIndex, descIndex) => {
            setData(prev => {
              const newData = JSON.parse(JSON.stringify(prev));
              newData.experience[expIndex].roles[roleIndex].description.splice(descIndex, 1);
              return newData;
            });
          };

          return (
            <div>
              {/* Controls Header */}
              <div id="controls-bar" className="sticky top-0 z-50 flex flex-wrap justify-center md:justify-end items-center p-4 gap-3 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                
                <button 
                  onClick={() => setIsEditing(!isEditing)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-colors ${
                    isEditing 
                      ? 'bg-green-500 hover:bg-green-600 text-white shadow-md' 
                      : 'bg-blue-100 hover:bg-blue-200 text-blue-700 dark:bg-blue-900/50 dark:hover:bg-blue-800/80 dark:text-blue-300'
                  }`}
                >
                  {isEditing ? <><Icon name="Save" size={18} /> Kaydet / Çık</> : <><Icon name="Edit2" size={18} /> Düzenle</>}
                </button>

                {isEditing && (
                  <button 
                    onClick={resetData}
                    className="flex items-center gap-2 px-4 py-2 rounded-full bg-red-100 hover:bg-red-200 text-red-700 dark:bg-red-900/30 dark:hover:bg-red-800/50 dark:text-red-400 font-medium transition-colors"
                    title="Orijinal Verilere Dön"
                  >
                    <Icon name="RotateCcw" size={18} /> <span className="hidden sm:inline">Sıfırla</span>
                  </button>
                )}

                <div className="w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1 hidden sm:block"></div>

                <button 
                  onClick={handlePrint}
                  className={`flex items-center gap-2 px-4 py-2 rounded-full transition-colors font-medium text-white ${isPrintPending ? 'bg-indigo-400 cursor-wait' : 'bg-indigo-600 hover:bg-indigo-700'}`}
                  title="PDF olarak kaydet veya yazdır (Sitenizde Çalışır)"
                  disabled={isPrintPending}
                >
                  <Icon name="Download" size={18} />
                  <span className="hidden sm:inline">{isPrintPending ? 'Hazırlanıyor...' : 'PDF İndir'}</span>
                </button>

                <button 
                  onClick={toggleTheme}
                  className="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors font-medium text-slate-800 dark:text-slate-200"
                >
                  {darkMode ? <Icon name="Sun" size={18} className="text-yellow-400" /> : <Icon name="Moon" size={18} className="text-slate-700" />}
                  <span className="hidden sm:inline">{darkMode ? 'Açık Mod' : 'Koyu Mod'}</span>
                </button>
              </div>

              {/* Main CV Container */}
              <div id="cv-content" className="max-w-[210mm] mx-auto p-6 sm:p-10 print:p-0 bg-white dark:bg-slate-900 shadow-xl print:shadow-none my-8 print:my-0 transition-colors">
                
                <header className="flex flex-col md:flex-row items-center md:items-start gap-8 border-b border-slate-300 dark:border-slate-700 pb-8 mb-8 print-break-inside-avoid">
                  <div className="relative group shrink-0">
                    <img 
                      src={data.personal.photo} 
                      alt={data.personal.name} 
                      className="w-36 h-36 sm:w-40 sm:h-40 rounded-full object-cover border-4 border-slate-100 dark:border-slate-800 shadow-lg print:border-slate-200"
                    />
                    {isEditing && (
                      <div className="absolute inset-0 bg-black/70 rounded-full flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity p-4 text-center">
                        <Icon name="ImageIcon" className="text-white mb-2" size={24} />
                        <span className="text-white text-xs font-medium">Fotoğraf Linki:</span>
                        <input 
                          type="text" 
                          className="w-full text-xs p-1 mt-1 rounded text-black border-none focus:ring-2 focus:ring-blue-500" 
                          value={data.personal.photo} 
                          onChange={e => updatePersonal('photo', e.target.value)} 
                          placeholder="URL yapıştır"
                        />
                      </div>
                    )}
                  </div>

                  <div className="flex-1 text-center md:text-left w-full mt-2">
                    <h1 className="text-4xl sm:text-5xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight">
                      <EditableField value={data.personal.name} onChange={(v) => updatePersonal('name', v)} isEditing={isEditing} />
                    </h1>
                    <h2 className="text-xl sm:text-2xl font-medium text-blue-600 dark:text-blue-400 mb-5">
                      <EditableField value={data.personal.title} onChange={(v) => updatePersonal('title', v)} isEditing={isEditing} />
                    </h2>
                    
                    <div className="flex flex-col sm:flex-row justify-center md:justify-start gap-3 sm:gap-6 text-sm text-slate-600 dark:text-slate-400">
                      <div className="flex items-center gap-2 justify-center">
                        <Icon name="MapPin" size={18} className="text-slate-400 shrink-0" /> 
                        <EditableField value={data.personal.location} onChange={(v) => updatePersonal('location', v)} isEditing={isEditing} />
                      </div>
                      <div className="flex items-center gap-2 justify-center">
                        <Icon name="Mail" size={18} className="text-slate-400 shrink-0" /> 
                        <EditableField value={data.personal.email} onChange={(v) => updatePersonal('email', v)} isEditing={isEditing} />
                      </div>
                    </div>
                  </div>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-12 print:gap-8">
                  
                  {/* LEFT COLUMN */}
                  <div className="lg:col-span-2 space-y-10">
                    
                    <section className="print-break-inside-avoid">
                      <h3 className="text-2xl font-bold border-b-2 border-blue-500 inline-block pb-1 mb-4 text-slate-900 dark:text-white uppercase tracking-wider text-sm">Professional Summary</h3>
                      <div className="leading-relaxed text-slate-700 dark:text-slate-300 text-justify">
                        <EditableField 
                          value={data.personal.summary} 
                          onChange={(v) => updatePersonal('summary', v)} 
                          isEditing={isEditing} 
                          multiline 
                        />
                      </div>
                    </section>

                    <section>
                      <h3 className="text-2xl font-bold border-b-2 border-blue-500 inline-block pb-1 mb-6 text-slate-900 dark:text-white flex items-center gap-2 uppercase tracking-wider text-sm">
                        <Icon name="Briefcase" size={20} className="text-blue-500" /> Experience
                      </h3>
                      
                      <div className="space-y-8">
                        {data.experience.map((exp, expIndex) => (
                          <div key={expIndex} className="relative pl-6 border-l-2 border-slate-200 dark:border-slate-700 print-break-inside-avoid">
                            <div className="absolute w-3 h-3 bg-blue-500 rounded-full -left-[7px] top-2 border-2 border-white dark:border-slate-900 print:border-white"></div>
                            
                            <div className="mb-2 flex flex-col sm:flex-row sm:items-baseline justify-between gap-1">
                              <h4 className="text-xl font-bold text-slate-900 dark:text-white flex-1">
                                <EditableField value={exp.company} onChange={(v) => updateExp(expIndex, 'company', v)} isEditing={isEditing} />
                              </h4>
                              <div className="text-sm font-medium text-slate-500 dark:text-slate-400 sm:text-right">
                                <EditableField value={exp.location} onChange={(v) => updateExp(expIndex, 'location', v)} isEditing={isEditing} />
                              </div>
                            </div>
                            
                            <div className="space-y-6 mt-4">
                              {exp.roles.map((role, roleIndex) => (
                                <div key={roleIndex} className="print-break-inside-avoid">
                                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-2">
                                    <h5 className="text-lg font-semibold text-blue-600 dark:text-blue-400 flex-1">
                                      <EditableField value={role.title} onChange={(v) => updateRole(expIndex, roleIndex, 'title', v)} isEditing={isEditing} />
                                    </h5>
                                    <div className="text-sm font-semibold bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full text-slate-700 dark:text-slate-300 whitespace-nowrap w-max print:bg-transparent print:px-0 print:text-slate-500">
                                      <EditableField value={role.period} onChange={(v) => updateRole(expIndex, roleIndex, 'period', v)} isEditing={isEditing} />
                                    </div>
                                  </div>
                                  
                                  <ul className="space-y-2 mt-3">
                                    {role.description.map((item, descIndex) => (
                                      <li key={descIndex} className="flex items-start gap-2 text-slate-700 dark:text-slate-300 group">
                                        <Icon name="ChevronRight" size={16} className="text-blue-500 mt-1 flex-shrink-0" />
                                        <div className="flex-1 text-justify leading-relaxed">
                                          <EditableField 
                                            value={item} 
                                            onChange={(v) => updateRoleDesc(expIndex, roleIndex, descIndex, v)} 
                                            isEditing={isEditing} 
                                            multiline={isEditing}
                                          />
                                        </div>
                                        {isEditing && (
                                          <button 
                                            onClick={() => removeRoleDesc(expIndex, roleIndex, descIndex)}
                                            className="text-red-400 hover:text-red-600 p-1 opacity-50 hover:opacity-100 transition-opacity flex-shrink-0 mt-1 print-hidden"
                                            title="Sorumluluğu Sil"
                                          >
                                            <Icon name="Trash2" size={16} />
                                          </button>
                                        )}
                                      </li>
                                    ))}
                                  </ul>
                                  {isEditing && (
                                    <button 
                                      onClick={() => addRoleDesc(expIndex, roleIndex)}
                                      className="mt-3 px-3 py-1.5 border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 rounded-lg flex items-center gap-1 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm transition-colors print-hidden"
                                    >
                                      <Icon name="Plus" size={14} /> Sorumluluk Ekle
                                    </button>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </section>

                  </div>

                  {/* RIGHT COLUMN */}
                  <div className="space-y-10">
                    
                    <section className="print-break-inside-avoid">
                      <h3 className="text-2xl font-bold border-b-2 border-blue-500 inline-block pb-1 mb-6 text-slate-900 dark:text-white uppercase tracking-wider text-sm">Core Competencies</h3>
                      <div className="flex flex-wrap gap-2">
                        {data.skills.map((skill, index) => (
                          <div key={index} className="flex items-center group">
                            <div className={`px-3 py-1.5 bg-slate-50 dark:bg-slate-800 border shadow-sm rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors print:border-slate-300 print:bg-white print:shadow-none ${isEditing ? 'border-blue-300 dark:border-blue-600' : 'border-slate-200 dark:border-slate-700'}`}>
                              <EditableField value={skill} onChange={(v) => updateSkill(index, v)} isEditing={isEditing} />
                            </div>
                            {isEditing && (
                              <button onClick={() => removeSkill(index)} className="ml-1 text-red-400 hover:text-red-600 opacity-50 group-hover:opacity-100 transition-opacity print-hidden">
                                <Icon name="Trash2" size={16} />
                              </button>
                            )}
                          </div>
                        ))}
                        {isEditing && (
                          <button onClick={addSkill} className="px-3 py-1.5 border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 rounded-lg flex items-center gap-1 hover:bg-slate-50 dark:hover:bg-slate-800 text-sm transition-colors print-hidden">
                            <Icon name="Plus" size={14} /> Ekle
                          </button>
                        )}
                      </div>
                    </section>

                    <section className="print-break-inside-avoid">
                      <h3 className="text-2xl font-bold border-b-2 border-blue-500 inline-block pb-1 mb-6 text-slate-900 dark:text-white flex items-center gap-2 uppercase tracking-wider text-sm">
                        <Icon name="GraduationCap" size={20} className="text-blue-500" /> Education
                      </h3>
                      <div className="space-y-5">
                        {data.education.map((edu, index) => (
                          <div key={index} className="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700 print:bg-transparent print:border-b print:border-x-0 print:border-t-0 print:rounded-none print:px-0">
                            <h4 className="font-bold text-slate-900 dark:text-white text-base leading-tight mb-2">
                              <EditableField value={edu.degree} onChange={(v) => updateEdu(index, 'degree', v)} isEditing={isEditing} multiline={isEditing} />
                            </h4>
                            <div className="text-blue-600 dark:text-blue-400 font-semibold mb-3 text-sm">
                              <EditableField value={edu.school} onChange={(v) => updateEdu(index, 'school', v)} isEditing={isEditing} />
                            </div>
                            <div className="flex justify-between text-sm text-slate-600 dark:text-slate-400 mb-2 border-t border-slate-200 dark:border-slate-600 pt-2 print:border-slate-300">
                              <span className="w-1/2">
                                <EditableField value={edu.period} onChange={(v) => updateEdu(index, 'period', v)} isEditing={isEditing} />
                              </span>
                              <span className="font-bold w-1/2 text-right text-slate-800 dark:text-slate-200">
                                <EditableField value={edu.grade} onChange={(v) => updateEdu(index, 'grade', v)} isEditing={isEditing} />
                              </span>
                            </div>
                            {(edu.details || isEditing) && (
                              <div className="text-sm text-slate-700 dark:text-slate-300 italic mt-3 bg-white/60 dark:bg-slate-900/50 p-3 rounded print:bg-transparent print:p-0 print:mt-2">
                                <EditableField value={edu.details} onChange={(v) => updateEdu(index, 'details', v)} isEditing={isEditing} placeholder="Thesis/Dissertation details..." multiline />
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </section>

                    <section className="print-break-inside-avoid">
                      <h3 className="text-2xl font-bold border-b-2 border-blue-500 inline-block pb-1 mb-6 text-slate-900 dark:text-white flex items-center gap-2 uppercase tracking-wider text-sm">
                        <Icon name="BookOpen" size={20} className="text-blue-500" /> Selected Publications
                      </h3>
                      <div className="space-y-4">
                        {data.publications.map((pub, index) => (
                          <div key={index} className="group border-l-2 border-slate-200 hover:border-blue-400 dark:border-slate-700 dark:hover:border-blue-500 pl-3 transition-colors print:border-slate-300 print:pl-2">
                            <h4 className="font-medium text-slate-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors text-sm text-justify leading-relaxed">
                              {isEditing ? '' : '"'}
                              <EditableField value={pub.title} onChange={(v) => updatePub(index, 'title', v)} isEditing={isEditing} multiline={isEditing} />
                              {isEditing ? '' : '"'}
                            </h4>
                            <div className="text-xs text-slate-500 dark:text-slate-400 mt-2 flex flex-col sm:flex-row sm:justify-between gap-1">
                              <span className="italic flex-1">
                                <EditableField value={pub.journal} onChange={(v) => updatePub(index, 'journal', v)} isEditing={isEditing} />
                              </span>
                              <span className="font-semibold whitespace-nowrap text-blue-500 dark:text-blue-400">
                                <EditableField value={pub.date} onChange={(v) => updatePub(index, 'date', v)} isEditing={isEditing} />
                              </span>
                            </div>
                          </div>
                        ))}
                        <div className="text-sm text-blue-600 dark:text-blue-400 font-medium italic pt-4 text-center sm:text-left print:text-slate-600">
                          + Multiple other highly cited academic papers.
                        </div>
                      </div>
                    </section>

                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
